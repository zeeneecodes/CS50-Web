<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style/style.css">
  <title>Advanced Search</title>
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">Google Search</a></li>
      <li><a href="image.html">Google Image</a></li>
    </ul>
  </nav>

  <form action="https://www.google.com/search" class="form-advanced">
    <p>Advanced Search</p>
    
    <p>Find pages with...</p>
    <div class="advanced-cont">

      <label for="as_q">all these words:</label>
      <input type="text" name="as_q">
      
      <label for="as_epq">this exact word / phrase:</label>
      <input type="text" name="as_epq">
      
      <label for="as_q">any of these words:</label>
      <input type="text" name="as_oq">
      
      <label for="as_q">none of these words:</label>
      <input type="text" name="as_eq">
    </div>
    
    <input type="submit" value="Advanced Search" class="btn-adv">
</form>
</body>
</html>
